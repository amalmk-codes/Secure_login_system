{% extends 'base.html' %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="mb-3">Create Account</h2>
          <p class="text-muted">Use a strong password to protect your account.</p>
          <form method="post" class="mt-3">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" required>
              <div class="form-text">Include uppercase, lowercase, a number, and a special character.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
          </form>
          <p class="mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
