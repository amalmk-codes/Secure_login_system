{% extends 'base.html' %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="mb-3">Verify One-Time Code</h2>
          <p class="text-muted">Enter the code from your authenticator app to finish signing in. You can also use a backup recovery code.</p>
          <form method="post">
            <div class="mb-3">
              <label class="form-label">6-digit code</label>
              <input type="text" class="form-control" name="otp" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Verify</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
