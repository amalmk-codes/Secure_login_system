services:
  - type: web
    name: secure-login-system
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /login
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: secure-login-system-db
          property: connectionString

databases:
  - name: secure-login-system-db
    databaseName: secure_login_system
    user: secure_login_system
    plan: starter
